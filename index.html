<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Conecta Mapa</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.css" rel="stylesheet">

<style>
body {
  margin: 0;
  background: #05070d;
  font-family: Arial, sans-serif;
}

#map {
  width: 100%;
  height: 100vh;
}

/* Glow estilo Conecta */
.overlay {
  position: absolute;
  top: 20px;
  left: 20px;
  color: #00cfff;
  font-size: 18px;
  text-shadow: 0 0 10px #00cfff;
  z-index: 1;
}

.boton {
  position: absolute;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  background: linear-gradient(135deg, #00cfff, #0066ff);
  border: none;
  padding: 15px 30px;
  border-radius: 30px;
  color: white;
  font-size: 16px;
  box-shadow: 0 0 20px #00cfff;
}
</style>

</head>
<body>

<div class="overlay">Conecta Modo Viaje</div>
<button class="boton">Confirmar ubicación</button>

<div id="map"></div>

<script src="https://api.mapbox.com/mapbox-gl-js/v2.15.0/mapbox-gl.js"></script>

<script>
mapboxgl.accessToken = 'pk.eyJ1IjoiMzkxODM2IiwiYSI6ImNtbXl4dWZoNzAyamwycm9pZHBoYjNpNzEifQ.ryQd-8yPv1gX6BkNsToW_A'; // TOKEN DEMO

const map = new mapboxgl.Map({
  container: 'map',
  style: 'mapbox://styles/mapbox/dark-v11',
  center: [-99.1332, 19.4326], // CDMX
  zoom: 12
});

// marcador en el centro
const marker = new mapboxgl.Marker({ color: "#00cfff" })
  .setLngLat([-99.1332, 19.4326])
  .addTo(map);
</script>

</body>
</html>
